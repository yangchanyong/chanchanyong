<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찬찬용</title>
    <style>
        /* 화면 전체 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 배경 및 정렬 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 무지개 배경 애니메이션 */
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1, #fbc2eb, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            
            font-family: sans-serif;
        }

        /* 텍스트 스타일 */
        h1 {
            /* 글자 길이에 맞춰 크기 자동 조절 (반응형) */
            /* 글자수가 늘어났으므로 4.2vw -> 3.5vw로 살짝 줄여 균형을 맞춤 */
            font-size: 3.5vw; 
            
            font-weight: bold;
            color: white;
            
            /* 깔끔한 검정 테두리 (깨짐 방지용 그림자 방식) */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                -2px  0px 0 #000,
                 2px  0px 0 #000,
                 0px -2px 0 #000,
                 0px  2px 0 #000;

            margin: 0;
            white-space: nowrap; /* 줄바꿈 없이 한 줄로 표시 */
            user-select: none;
        }

        /* 배경 애니메이션 키프레임 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <h1>찬찬용과 함께하는 신나는 세상!</h1>
</body>
</html>
